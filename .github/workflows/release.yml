name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Publish stable release
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          VERSION_BUMPED=false

          if npm view "@thiagopi/ts-utils-kit@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} is already on npm. Bumping patch."
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            VERSION_BUMPED=true
          elif git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Bumping patch."
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            VERSION_BUMPED=true
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version_bumped=${VERSION_BUMPED}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: steps.version.outputs.version_bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Push version bump
        if: steps.version.outputs.version_bumped == 'true'
        run: git push origin main

      - name: Add install instructions to job summary
        run: |
          {
            echo "## Release published"
            echo ""
            echo "Install this version:"
            echo ""
            echo '```bash'
            echo "npm install @thiagopi/ts-utils-kit@${{ steps.version.outputs.version }}"
            echo '```'
            echo ""
            echo "Or install the latest stable tag:"
            echo ""
            echo '```bash'
            echo "npm install @thiagopi/ts-utils-kit@latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Install

            Install this version:

            ```bash
            npm install @thiagopi/ts-utils-kit@${{ steps.version.outputs.version }}
            ```

            Or install the latest stable tag:

            ```bash
            npm install @thiagopi/ts-utils-kit@latest
            ```
