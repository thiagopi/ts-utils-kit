name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Create release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@thiagopi'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")

          if npm view "@thiagopi/ts-utils-kit@${PKG_VERSION}" version >/dev/null 2>&1; then
            NPM_LATEST=$(npm view "@thiagopi/ts-utils-kit" version)
            echo "Version ${PKG_VERSION} is already published. Bumping from ${NPM_LATEST}."
            npm version "${NPM_LATEST}" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
          fi

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          while npm view "@thiagopi/ts-utils-kit@${VERSION}" version >/dev/null 2>&1 || git rev-parse "${TAG}" >/dev/null 2>&1; do
            echo "Version ${VERSION} is already published or tagged. Bumping patch."
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
          done

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Add release summary
        run: |
          {
            echo "## Release tag created"
            echo ""
            echo "Tag \`${{ steps.version.outputs.tag }}\` will publish \`${{ steps.version.outputs.version }}\` to GitHub Packages."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Install

            Configure your `.npmrc`:

            ```
            @thiagopi:registry=https://npm.pkg.github.com
            //npm.pkg.github.com/:_authToken=YOUR_GITHUB_TOKEN
            ```

            Install this version:

            ```bash
            npm install @thiagopi/ts-utils-kit@${{ steps.version.outputs.version }}
            ```
