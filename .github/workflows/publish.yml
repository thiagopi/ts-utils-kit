name: Publish package

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@thiagopi'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Skip if version is already published
        id: check
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@thiagopi/ts-utils-kit@${VERSION}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already on GitHub Packages."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        if: steps.check.outputs.publish == 'true'
        run: npm test

      - name: Build
        if: steps.check.outputs.publish == 'true'
        run: npm run build

      - name: Publish package
        if: steps.check.outputs.publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add install instructions to job summary
        if: steps.check.outputs.publish == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## Published to GitHub Packages"
            echo ""
            echo "Install this version:"
            echo ""
            echo '```bash'
            echo "npm install @thiagopi/ts-utils-kit@${VERSION}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
